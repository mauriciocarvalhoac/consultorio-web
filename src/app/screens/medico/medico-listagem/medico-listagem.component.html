<article style="background: #EEF; padding: 10px 10px; height: calc(100vh - 50px - 7px);">
    <nav>
        <span style="font-size: 12px;">Cadastro > Listagem de Médicos</span>
        <h3>Listagem de Médicos</h3>
    </nav>

    <section class="formulario-cadastro">
        <nav class="navbar-buttons-action">
            <div>
                <button routerLink="/medico-inclusao" class="btn btn-sm btn-outline-secondary">Adicionar</button>
            </div>
        </nav>

        <section style="border: 1px solid #DDD; padding: 10px;">
            <form [formGroup]="formulario">
                <div class="row">
                    <div class="col">
                        <label>Nome:</label>
                        <input formControlName="nome" class="form-control">
                    </div>
                    <div class="col-3">
                        <label>CPF:</label>
                        <input formControlName="cpf" mask="000.000.000-00" class="form-control">
                    </div>
                </div>
            </form>

            <div class="d-flex justify-content-end" style="margin-top: 10px;">
                <button (click)="filtrar()" class="btn btn-sm btn-outline-primary ml-10">Filtrar</button>
            </div>
        </section>

        <div style="background: #EEE;" class="table-responsive">
            <h3>2 itens encontratos</h3>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>CPF</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let m of lista">
                        <td class="text-nowrap">{{ m.uuid }}</td>
                        <td class="w-100">{{ m.nome }}</td>
                        <td>{{ m.cpf }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</article>
